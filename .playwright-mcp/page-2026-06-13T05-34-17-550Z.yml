          - generic [ref=e52]:
            - paragraph [ref=e53]: 12月10日，最高人民法院举办新闻发布会，发布《最高人民法院关于审理行政协议案件若干问题的规定》（简称“行政协议解释”）和10个参考案例：
            - blockquote [ref=e54]:
              - text: 
              - paragraph [ref=e55]:
                - strong [ref=e57]: 目 录
              - paragraph [ref=e58]: 1.大英县永佳纸业有限公司诉四川省大英县人民政府不履行行政协议案
              - paragraph [ref=e59]: 2.蒋某某诉重庆高新区管理委员会、重庆高新技术产业开发区征地服务中心行政协议纠纷案
              - paragraph [ref=e60]: 3.成都亿嘉利科技有限公司、乐山沙湾亿嘉利科技有限公司诉四川省乐山市沙湾区人民政府解除投资协议并赔偿经济损失案
              - paragraph [ref=e61]: 4.英德中油燃气有限公司诉英德市人民政府、英德市英红工业园管理委员会、英德华润燃气有限公司特许经营协议纠纷案
              - paragraph [ref=e62]: 5.王某某诉江苏省仪征枣林湾旅游度假区管理办公室房屋搬迁协议案
              - paragraph [ref=e63]: 6.崔某某诉徐州市丰县人民政府招商引资案
              - paragraph [ref=e64]: 7.金华市光跃商贸有限公司诉金华市金东区人民政府拆迁行政合同案
              - paragraph [ref=e65]: 8.安吉展鹏金属精密铸造厂诉安吉县人民政府搬迁行政协议案
              - paragraph [ref=e66]: 9.寿光中石油昆仑燃气有限公司诉寿光市人民政府解除特许经营协议案
              - paragraph [ref=e67]: 10.徐某某诉安丘市人民政府房屋补偿安置协议案
            - paragraph [ref=e68]:
              - link "最高院发布10个行政协议案件司法解释参考案例" [ref=e69] [cursor=pointer]:
                - /url: https://image.sxls.com/2019/12/xingzhenganli.jpg
                - img "最高院发布10个行政协议案件司法解释参考案例" [ref=e70]
            - paragraph [ref=e71]:
              - strong [ref=e72]:
                - generic [ref=e73]: 1.大英县永佳纸业有限公司诉四川省大英县人民政府不履行行政协议案
              - text: ——行政协议的定义及相对人不履行行政协议约定义务时行政机关的救济途径。
            - paragraph [ref=e74]:
              - strong [ref=e75]: （一）基本案情
            - paragraph [ref=e76]: 2013年7月，中共四川省遂宁市大英县委为落实上级党委、政府要求，实现节能减排目标，出台中共大英县委第23期《关于研究永佳纸业处置方案会议纪要》（以下简称《会议纪要》），决定对大英县永佳纸业有限公司（以下简称永佳公司）进行关停征收。根据《会议纪要》，四川省大英县人民政府（以下简称大英县政府）安排大英县回马镇政府（以下简称回马镇政府）于2013年9月6日与永佳公司签订了《大英县永佳纸业有限公司资产转让协议书》（以下简称《资产转让协议书》），永佳公司关停退出造纸行业，回马镇政府受让永佳公司资产并支付对价。协议签订后，永佳公司依约定履行了大部分义务，回马镇政府接受了永佳公司的厂房等资产后，于2014年4月4日前由大英县政府、回马镇政府共计支付了永佳公司补偿金322.4万元，之后经多次催收未再履行后续付款义务。永佳公司认为其与回马镇政府签订的《资产转让协议书》系合法有效的行政合同，大英县政府、回马镇政府应当按约定履行付款义务。故诉至法院请求判令，大英县政府、回马镇政府支付永佳公司转让费人民币894.6万元及相应利息。
            - paragraph [ref=e77]:
              - strong [ref=e78]: （二）裁判结果
            - paragraph [ref=e79]: 经四川省遂宁市中级人民法院一审，四川省高级人民法院二审判决《资产转让协议书》合法有效，大英县政府应当给付尚欠永佳公司的征收补偿费用人民币794.6万元及资金利息。大英县政府、回马镇政府不服，向最高人民法院申请再审称，《资产转让协议书》系民事合同，若属行政协议，永佳公司不履行约定义务将导致其无法救济，故本案不属于行政诉讼受案范围。
            - paragraph [ref=e80]: 最高人民法院再审裁定认为，界定行政协议有以下四个方面要素：一是主体要素，即必须一方当事人为行政机关，另一方为行政相对人；二是目的要素，即必须是为了实现行政管理或者公共服务目标；三是内容要素，协议内容必须具有行政法上的权利义务内容；四是意思要素，即协议双方当事人必须协商一致。在此基础上，行政协议的识别可以从以下两方面标准进行：一是形式标准，即是否发生于履职的行政机关与行政相对人之间的协商一致；二是实质标准，即协议的标的及内容有行政法上的权利义务，该权利义务取决于是否行使行政职权、履行行政职责；是否为实现行政管理目标和公共服务；行政机关是否具有优益权。本案案涉《资产转让协议书》系大英县政府为履行环境保护治理法定职责，由大英县政府通过回马镇政府与永佳公司订立协议替代行政决定，其意在通过受让涉污企业永佳公司资产，让永佳公司退出造纸行业，以实现节能减排和环境保护的行政管理目标，维护公共利益，符合上述行政协议的四个要素和两个标准，系行政协议，相应违约责任应由大英县政府承担。同时，我国行政诉讼虽是奉行被告恒定原则，但并不影响作为行政协议一方当事人的行政机关的相关权利救济。在相对人不履行行政协议约定义务，行政机关又不能起诉行政相对人的情况下，行政机关可以通过申请非诉执行或者自己强制执行实现协议救济。行政机关可以作出要求相对人履行义务的决定，相对人拒不履行的，行政机关可以该决定为执行依据向人民法院申请强制执行或者自己强制执行。故不存在案涉《资产转让协议书》若属行政协议，永佳公司不履行约定义务将导致行政机关无法救济的问题。据此，最高人民法院裁定驳回大英县政府的再审申请。
            - paragraph [ref=e81]:
              - strong [ref=e83]: 2.蒋某某诉重庆高新区管理委员会、重庆高新技术产业开发区征地服务中心行政协议纠纷案
              - text: ——因行政协议的订立、履行、变更、终止等产生的各类行政协议纠纷均属于人民法院行政诉讼受案范围。
            - paragraph [ref=e84]:
              - strong [ref=e85]: （一）基本案情
            - paragraph [ref=e86]: 2016年7月12日，蒋某某不服其与重庆高新技术产业开发区征地服务中心签订的《征地拆迁补偿安置协议》，以重庆高新区管委会为被告向重庆市第五中级人民法院提起诉讼，请求撤销征地服务中心于2015年12月25日与其签订的《征地拆迁补偿安置协议》。
            - paragraph [ref=e87]:
              - strong [ref=e88]: （二）裁判结果
            - paragraph [ref=e89]: 经重庆市第五中级人民法院一审，重庆市高级人民法院二审认为，行政诉讼法第十二条第一款第十一项规定，人民法院受理公民、法人或者其他组织认为行政机关不依法履行、未按照约定履行或者违法变更、解除政府特许经营协议、土地房屋征收补偿协议等协议提起的行政诉讼。蒋某某起诉请求撤销《征地拆迁补偿安置协议》，其起诉状中所诉理由均系对签订协议时主体、程序以及协议约定和适用法律所提出的异议，不属于行政机关不依法履行、未按照约定履行或者违法变更、解除协议内容的范畴，以蒋某某的起诉不属于人民法院行政诉讼受案范围为由裁定驳回蒋某某的起诉。
            - paragraph [ref=e90]: 蒋某某不服，向最高人民法院申请再审。最高人民法院经审理后认为，通过对行政诉讼法、合同法及相关司法解释有关规定的梳理，行政协议争议类型，除行政诉讼法第十二条第一款第十一项列举的四种情形外，还包括协议订立时的缔约过失，协议成立与否，协议有效无效，撤销、终止行政协议，请求继续履行行政协议，采取相应的补救措施，请求行政赔偿和行政补偿责任，以及行政机关监督、指挥、解释等行为产生的行政争议。将行政协议案件的行政诉讼受案范围仅理解为行政诉讼法第十二条第一款第十一项规定的四种情形，既不符合现行法律及司法解释的规定，亦在理论上难于自圆其说且在实践中容易造成不必要的混乱。故裁定撤销一、二审裁定，指令一审法院继续审理本案。
            - paragraph [ref=e91]:
              - strong [ref=e93]: 3.成都亿嘉利科技有限公司、乐山沙湾亿嘉利科技有限公司诉四川省乐山市沙湾区人民政府解除投资协议并赔偿经济损失案
              - text: ——2015年5月1日之前订立的行政协议纳入行政诉讼受案范围的条件及行政机关不依法履行、未按照约定履行协议之诉讼时效的适用
            - paragraph [ref=e94]:
              - strong [ref=e95]: （一）基本案情
            - paragraph [ref=e96]: 成都亿嘉利科技有限公司（以下简称成都亿嘉利公司）、乐山沙湾亿嘉利科技有限公司（以下简称乐山亿嘉利公司）向四川省乐山市中级人民法院诉称，2011年4月1日，成都亿嘉利公司与四川省乐山市沙湾区人民政府（以下简称沙湾区政府）签署《投资协议》，约定成都亿嘉利公司租赁约800亩土地，投资5000万元建设以鳗鱼养殖为主并与新农村建设相结合的现代观光农业项目，沙湾区政府负责提供“一站式服务”、为加快项目建设进度和协调相关部门的手续尽快落实。2011年9月13日，设立乐山亿嘉利公司，为项目公司。成都亿嘉利公司、乐山亿嘉利公司认为沙湾区政府一直怠于协调其项目行政手续办理事宜，隐瞒土地性质真相，无法办理相关手续，未按照约定履行《投资协议》，直接造成二公司重大损失。为此，诉请解除成都亿嘉利公司与沙湾区政府于2011年8月29日签署的《投资协议》，判令沙湾区政府赔偿二公司经济损失400万元。
            - paragraph [ref=e97]:
              - strong [ref=e98]: （二）裁判结果
            - paragraph [ref=e99]: 经四川省乐山市中级人民法院一审，四川省高级人民法院二审认为，对于行政诉讼法修改施行之前形成的行政协议，根据当时的法律规定和人民法院处理此类纠纷的通常做法，一般不纳入行政诉讼受案范围，主要通过当事人提起民事诉讼方式寻求司法救济，故依法裁定不予立案。成都亿嘉利公司、乐山亿嘉利公司不服，向最高人民法院申请再审。
            - paragraph [ref=e100]: 最高人民法院经审查认为，案涉《投资协议》符合行政协议本质特征，对形成于2015年5月1日之前的案涉《投资协议》产生的纠纷，当时的法律、行政法规、司法解释或者我国缔结或参加的国际条约没有规定其他争议解决途径的，作为协议一方的公民、法人或者其他组织提起行政诉讼，人民法院可以依法受理。行政协议作为一种行政手段，既有行政性又有协议性，应具体根据争议及诉讼的性质来确定相关的规则适用，在与行政法律规范不相冲突的情况下可以参照适用民事法律规范，故诉讼时效制度可以适用于公民、法人或者其他组织对行政机关不依法履行、未按照约定履行协议提起的行政诉讼案件。本案系因成都亿嘉利公司、乐山亿嘉利公司对沙湾区政府未履行案涉《投资协议》而提起的请求解除协议的行政诉讼，应当参照适用民事法律规范关于诉讼时效的规定，不再适用起诉期限的规定。结合本案案情，成都亿嘉利公司、乐山亿嘉利公司于2016年8月31日提起本案诉讼，并未超过诉讼时效。故撤销一、二审裁定，指令一审法院受理本案。
            - paragraph [ref=e101]:
              - strong [ref=e103]: 4.英德中油燃气有限公司诉英德市人民政府、英德市英红工业园管理委员会、英德华润燃气有限公司特许经营协议纠纷案
              - text: ——在能源和公共基础设施建设等领域，行政机关将同一区域内独家特许经营权通过行政协议先后授予给不同的经营者，人民法院应当认定该行为属于违约行为，并判决其承担相应法律责任。
            - paragraph [ref=e104]:
              - strong [ref=e105]: （一）基本案情
            - paragraph [ref=e106]: 2008年8月20日，英德市建设局与中油中泰燃气有限责任公司（下称中油中泰公司）签订《英德市管道燃气特许经营协议》。同年8月22日，英德市人民政府向英德市建设局作出批复，同意将该市管道天然气特许经营权独家授予中油中泰公司，期限为30年，至2038年8月20日止。中油中泰公司组建英德中油燃气有限公司（下称中油公司）负责经营涉案业务。2010年至2011年间，英德市英红工业园管理委员会（下称英红园管委会）先后与中油公司签订投资天然气站项目合同、补充协议等协议，就该公司在英红工业园内的管道燃气特许经营权具体实施，包括许可范围、开发建设及经营期限、建设用地等进行约定。
            - paragraph [ref=e107]: 2012年9月4日，英德市政府发布管道燃气特许经营权招投标公告。华润燃气投资（中国）有限公司参与招标并中标，并于2013年2月20日与英德市规划和城市综合管理局签订《英德市管道燃气特许经营协议》，取得包括英红工业园在内的英德管道燃气业务独家特许经营权，有效期限为30年，至2043年2月20日止。该公司随后成立了英德华润燃气有限公司（下称华润公司）负责项目经营管理。
            - paragraph [ref=e108]: 中油公司因与华润公司对英红工业园管道燃气特许经营权范围发生争议，向法院起诉，请求：判令英德市政府、英红园管委会继续履行涉案行政协议，授予其在英红工业园内管道燃气的独家特许经营权；判令该政府立即终止华润公司在涉案地域内的管道燃气建设及经营活动。
            - paragraph [ref=e109]:
              - strong [ref=e110]: （二）裁判结果
            - paragraph [ref=e111]: 经清远市中级人民法院一审，广东省高级人民法院二审认为，涉案合法有效，中油公司享有的特许经营合同权利受法律保护，协议各方应当按照约定履行相关的合同义务。英德市政府作为该管委会这一事业单位的设立机关以及特许经营许可一方，应承担相应合同义务，保障合同履行，但英德市政府又将英红工业园的管道燃气特许经营权授予给华润公司，存在对同一区域将具有排他性的独家特许经营权先后重复许可给不同的主体的行为，应当认定为违法。法院同时认为，该重复许可系行政机关的行政行为所致，并不必然导致在后的华润公司所获得的独家特许经营权无效，华润公司基于其所签订的特许经营权协议的相关合同利益、信赖利益亦应当予以保护。且中油公司、华润公司均已进行了管道建设并对园区企业供气，若撤销任何一家的特许经营权均将影响到所在地域的公共利益。对于重复许可的相关法律后果，应当由行政机关承担，不应由华润公司承担。英德市政府应当采取补救措施，依法作出行政处理，对双方相应经营地域范围予以界定，妥善解决本案经营权争议。故判决：一、确认涉案协议有效，确认中油公司在英红工业园内有管道燃气特许经营权，且不得授予第三方；二、确认英德市政府、英红园管委会将英红工业园内特许经营权授予华润公司的行为违法；三、责令英德市人民政府采取补救措施；四、驳回中油公司其他诉讼请求。
            - paragraph [ref=e112]:
              - strong [ref=e114]: 5.王某某诉江苏省仪征枣林湾旅游度假区管理办公室房屋搬迁协议案
              - text: ——行政协议的订立应遵循自愿、合法原则，被诉行政协议在受胁迫等违背相对方真实意思表示的情形下所签订的，人民法院可依法判决撤销该行政协议。
            - paragraph [ref=e115]:
              - strong [ref=e116]: （一）基本案情
            - paragraph [ref=e117]: 为加快铜山小镇项目建设，改善农民居住环境，推进城乡一体化建设和枣林湾旅游产业的发展，2017年，原仪征市铜山办事处（现隶属于省政府批准成立的江苏省仪征枣林湾旅游度假区管理办公室）决定对包括铜山村在内的部分民居实施协议搬迁，王某某所有的位于铜山村王营组12号的房屋在本次搬迁范围内。2017年8月4日早晨，仪征市真诚房屋拆迁服务有限公司工作人员一行到王某某家中商谈搬迁补偿安置事宜。2017年8月5日凌晨约一点三十分左右，王某某在本案被诉的《铜山体育建设特色镇项目房屋搬迁协议》上签字，同时在《房屋拆除通知单》上签字。2017年8月5日凌晨五点二十分，王某某被送至南京鼓楼医院集团仪征医院直至8月21日出院，入院诊断为“1.多处软组织挫伤；……”。因认为签订协议时遭到了胁迫，王某某于2017年9月19日向扬州市中级人民法院提起诉讼。
            - paragraph [ref=e118]:
              - strong [ref=e119]: （二）裁判结果
            - paragraph [ref=e120]: 扬州市中级人民法院一审认为，行政协议兼具单方意思与协商一致的双重属性，对行政协议的效力审查自然应当包含合法性和合约性两个方面。根据合同法第五十四条第二款规定，一方以欺诈、胁迫的手段或者乘人之危，使对方在违背真实意思的情况下订立的合同，受损害方有权请求人民法院或者仲裁机构予以变更或撤销。在签订本案被诉的搬迁协议过程中，虽无直接证据证明相关拆迁人员对王某某采用了暴力、胁迫等手段，但考虑到协商的时间正处于盛夏的8月4日，王某某的年龄已近70岁，协商的时间跨度从早晨一直延续至第二日凌晨一点三十分左右等，综合以上因素，难以肯定王某某在签订搬迁协议时系其真实意思表示,亦有违行政程序正当原则。据此，判决撤销本案被诉的房屋搬迁协议。双方当事人未上诉。
            - paragraph [ref=e121]:
              - strong [ref=e123]: 6.崔某某诉徐州市丰县人民政府招商引资案
              - text: ——行政机关违反招商引资承诺义务，滥用行政优益权的，人民法院不予支持。
            - paragraph [ref=e124]:
              - strong [ref=e125]: （一）基本案情
            - paragraph [ref=e126]: 2001年6月28日，中共丰县县委和丰县人民政府（以下简称丰县政府）印发丰委发〔2001〕23号《关于印发丰县招商引资优惠政策的通知》（以下简称《23号通知》），就丰县当地的招商引资奖励政策和具体实施作出相应规定。2003年，在崔某某及其妻子李某某的推介运作下，徐州康达环保水务有限公司建成并投产。后崔某某一直向丰县政府主张支付招商引资奖励未果。2015年5月，崔某某向一审法院提起本案之诉，请求判令丰县政府依照《23号通知》第25条和附则的规定兑现奖励义务。丰县政府在收到一审法院送达的起诉状副本后，其下属部门丰县发展改革与经济委员会（以下简称丰县发改委）于2015年6月作出《关于对<关于印发丰县招商引资优惠政策的通知>部分条款的解释》（以下简称《解释》），对《23号通知》第25条和附则作如下说明：“……3.本县新增固定资产投入300万元人民币以上者，可参照此政策执行。本条款是为了鼓励本县原有企业，增加固定资产投入，扩大产能，为我县税收作出新的贡献，可参照本优惠政策执行。”
            - paragraph [ref=e127]:
              - strong [ref=e128]: （二）裁判结果
            - paragraph [ref=e129]: 经江苏省徐州市中级人民法院一审，江苏省高级人民法院二审认为，丰县政府作出的上述招商引资奖励承诺，以及崔某某因此开展的介绍行为，符合居间人向委托人报告订立合同的机会或者提供订立合同的媒介服务，委托人支付报酬的特征，具备诺成性、双务性和不要式性的特点。崔某某多次主张丰县政府应当按照《23号通知》的规定向其支付招商引资奖励未果，由此发生的纠纷属于行政合同争议，依法属于人民法院行政诉讼受理范围。对于本案中丰县政府是否应当支付招商引资奖励费用的问题，要审查其行为有无违反准用的民事法律规范的基本原则。诚实信用原则不仅是合同法中的帝王条款，也是行政协议各方当事人应当遵守的基本行为准则。基于保护公共利益的考虑，可以赋予行政主体在解除和变更行政协议中具有一定的优益权，但这种优益权的行使不能与诚实信用原则相抵触，不能够被滥用，尤其是在行政协议案件中，对于关键条文的解释，应当限制行政主体在无其他证据佐证的情形下任意行使所谓的优益权。本案一审中丰县发改委将《23号通知》附则所规定的“本县新增固定资产投入”仅指丰县原有企业，追加投入，扩大产能，属于限缩性的解释。该解释与社会公众正常的理解不符。丰县政府通过对当时承诺重新界定的方式，推卸自身应负义务，是对优益权的滥用，显然有悖于诚实信用原则。故应当认为丰县发改委《解释》中的该相关内容无效，判令丰县政府继续依照《23号通知》的承诺履行义务。
            - paragraph [ref=e130]:
              - strong [ref=e132]: 7.金华市光跃商贸有限公司诉金华市金东区人民政府拆迁行政合同案
              - text: ——行政机关采用签订空白房地产收购补偿协议方式拆除房屋后，双方未能就补偿内容协商一致，行政机关又不作出补偿决定的，人民法院应当判决行政机关限期采取补救措施。
            - paragraph [ref=e133]:
              - strong [ref=e134]: （一）基本案情
            - paragraph [ref=e135]: 2017年3月4日，原告金华市光跃商贸有限公司法定代表人严某某与被告金华市金东区人民政府设立的多湖中央商务区征迁指挥部签订《多湖中央商务区金华市光跃商贸有限公司房屋及土地收购货币补偿协议》一份，原告同意多湖中央商务区征迁指挥部收购其所有的座落于金华市金东区浮桥东路88号华丰市场综合楼的房屋。但双方未就房屋的性质、面积及收购的补偿金额等内容进行约定。同日，原告法定代表人严某某作出书面承诺，承诺其本人会积极响应多湖中央商务区开发建设，同意先行拆除华丰市场所有建筑物，自愿承担先行拆除的所有法律效果。次日，多湖中央商务区征迁指挥部对原告所有的华丰市场综合楼实施了拆除。之后，因被收购房屋性质为商业用地、土地性质为工业用地，双方对适用何种补偿标准有争议，一直未就补偿金额协商一致。故原告起诉请求：确认《多湖中央商务区金华市光跃商贸有限公司房屋与土地收购货币补偿协议》无效；请求被告恢复原状并赔偿损失或按现行同类附近房地产价格赔偿原告损失。
            - paragraph [ref=e136]:
              - strong [ref=e137]: （二）裁判结果
            - paragraph [ref=e138]: 经浙江省金华市中级人民法院一审，浙江省高级人民法院二审认为，建立在平等、自愿、等价、有偿基础上的收购协议，在一定层面上有利于提高旧城改造的效率，并有助于通过合理的价格来对房屋所有权人给予更加充分更加及时的补偿安置，具有现实合理性和可行性。对于原告同意收购、承诺可以先行拆除再行协商补偿款项并已实际预支部分补偿款、行政机关愿意对房屋所有权人进行公平合理的并不低于当时当地同区位同类房屋市场评估价格的补偿安置，且不存在合同法第五十二条等规定的以欺诈、胁迫等手段签订收购协议情形的，不宜完全否定此种收购协议的合法性。故对原告事后要求确认该协议无效的请求，不予支持。同时鉴于协议约定的房屋已被拆除，对原告要求恢复房屋原状的请求，亦不予支持。对于涉案房屋的损失补偿问题，被告应采取补救措施，协商不成的，被告应及时作出补偿的处理意见。遂判决责令被告于本判决生效之日起三个月内对原告所有的案涉房屋的损失采取补救措施；驳回其他诉讼请求。
            - paragraph [ref=e139]:
              - strong [ref=e141]: 8.安吉展鹏金属精密铸造厂诉安吉县人民政府搬迁行政协议案
              - text: ——人民法院审理行政协议案件，在对行政协议进行效力性审查的同时，亦应当对行政机关订立行政协议的行为进行合法性审查，并作出相应裁判。
            - paragraph [ref=e142]:
              - strong [ref=e143]: （一）基本案情
            - paragraph [ref=e144]: 2012年5月18日，中共安吉县委办公室、安吉县人民政府办公室印发安委办［2012］61号文件设立安吉临港经济区管理委员会（以下简称临港管委会）。2013年12月30日，安吉县编制委员会发文撤销临港管委会。2015年11月18日，湖州振新资产评估有限公司接受安吉临港经济区管理委员会（以下简称临港管委会）委托对安吉展鹏金属精密铸造厂（以下简称展鹏铸造厂）进行资产评估，并出具《资产评估报告书》，评估目的是拆迁补偿。2016年1月22日，临港管委会与展鹏铸造厂就企业搬迁安置达成《企业搬迁补偿协议书》，约定临港管委会按货币形式安置，搬迁补偿总额合计1131650元。协议签订后，合同双方均依约履行各自义务，2017年7月12日，展鹏铸造厂以安吉县人民政府为被告提起诉讼，请求判令被告作出的《企业搬迁补偿协议书》的具体行政行为违法应予以撤销，并责令依法与其重新签订拆迁补偿协议。
            - paragraph [ref=e145]:
              - strong [ref=e146]: （二）裁判结果
            - paragraph [ref=e147]: 经湖州市中级人民法院一审，浙江省高级人民法院二审认为，行政协议既有行政性又有契约性。基于行政协议的双重性特点，在行政协议案件司法审查中应坚持对行政机关行政协议行为全程监督原则、双重审查双重裁判原则。在具体的审查过程中，既要审查行政协议的契约效力性，又要审查行政协议行为特别是订立、履行、变更、解除行政协议等行为的合法性。本案中，临港管委会系由安吉县人民政府等以规范性文件设立并赋予相应职能的机构，其不具有独立承担法律责任的能力，无权以自己的名义对外实施行政行为，该管委会被撤销后，更无权实施签约行为。虽然安吉县人民政府追认该协议的效力，并不能改变临港管委会签订涉案补偿协议行为违法的事实。但是，涉案补偿协议系双方基于真实意思表示自愿达成，且已经实际履行完毕，补偿协议的内容未并损害展鹏铸造厂的合法补偿权益，在安吉县人民政府对涉案补偿协议予以追认的情况下，协议效力应予保留。故判决确认安吉县人民政府等设立的临港管委会与展鹏铸造厂签订案涉协议的行为违法；驳回展鹏铸造厂要求撤销案涉协议并依法与其重新签订拆迁补偿协议的诉讼请求。
            - paragraph [ref=e148]:
              - strong [ref=e150]: 9.寿光中石油昆仑燃气有限公司诉寿光市人民政府解除特许经营协议案
              - text: ——特许经营协议在履行过程中，出现损害社会公共利益的情形，符合协议解除的法定条件，行政机关可以单方解除特许经营协议并收回特许经营权，但该行为亦应遵循法定程序，给相对方造成损失的，应当依法补偿。
            - paragraph [ref=e151]:
              - strong [ref=e152]: （一）基本案情
            - paragraph [ref=e153]: 2011年7月15日,寿光市人民政府授权寿光市住房和城乡建设局与寿光中石油昆仑燃气有限公司（以下简称昆仑燃气公司）签订《天然气综合利用项目合作协议》，约定由昆仑燃气公司在寿光市从事城市天然气特许经营，特许经营期限为30年。协议签订后，昆仑燃气公司办理了一部分开工手续，并对项目进行了开工建设，但一直未能完工。2014年7月10日，寿光市住房和城乡建设局发出催告通知，告知昆仑燃气公司在收到通知后两个月内抓紧办理天然气经营许可手续，否则将收回燃气授权经营区域。2015年6月29日，昆仑燃气公司向寿光市人民政府出具项目建设保证书，承诺在办理完相关手续后三个月内完成项目建设，否则自动退出授权经营区域。2016年4月6日，寿光市人民政府决定按违约责任解除特许经营协议并收回昆仑燃气公司的特许经营权。昆仑燃气公司不服，经复议未果，遂起诉请求确认寿光市人民政府收回其天然气特许经营权的行为违法并撤销该行政行为。
            - paragraph [ref=e154]:
              - strong [ref=e155]: （二）裁判结果
            - paragraph [ref=e156]: 经潍坊市中级人民法院一审，山东省高级人民法院二审认为，特许经营协议在履行过程中，出现了损害社会公共利益的情形，符合协议解除的法定条件，行政机关可以单方解除特许经营协议并收回特许经营权，但该行为亦应遵循法定程序，给相对方造成损失的还应当予以补偿。本案中，寿光市人民政府多次催促昆仑燃气公司完成天然气项目建设，但昆仑燃气公司长期无法完工，致使授权经营区域内居民供气目的无法实现，损害了社会公共利益，解除特许经营协议的法定条件成立。寿光市人民政府解除特许经营协议并收回昆仑燃气公司已获得的特许经营权，应依据《市政公用事业特许经营管理办法》第二十五条之规定告知昆仑燃气公司享有听证的权利，但其未能履行相应的告知义务，违反法定程序。因此，被诉行政行为虽然内容合法，但程序违法。鉴于被诉行政行为涉及社会公共利益，该行为一旦撤销会影响城市发展需要和居民供气需求，故该行为应判决确认程序违法但不予撤销。寿光市人民政府对此应采取相应的补救措施，对昆仑燃气公司的合理投入予以弥补。
            - paragraph [ref=e157]:
              - strong [ref=e159]: 10.徐某某诉安丘市人民政府房屋补偿安置协议案
              - text: ——行政协议存在重大且明显违法情形或者适用民事法律规范亦属无效的，人民法院应当确认该协议无效。
            - paragraph [ref=e160]:
              - strong [ref=e161]: （一）基本案情
            - paragraph [ref=e162]: 1993年12月，徐某某以非本村集体经济组织成员身份在王五里村购得一处宅基地，并盖有占地2间房屋的二层楼房。2013年，安丘市人民政府设立指挥部，对包括徐某某房屋所在的王五里村实施旧村改造，并公布安置补偿政策为“……房屋产权调换：每处3间以上的合法宅基地房屋在小区内安置调换200㎡楼房，分别选择一套80㎡、一套120㎡的十二层以下小高层楼房屋；2间以下的安置一套100㎡的小高层楼房。实际面积超出或不足部分，按安置价找差……”。同年8月5日，指挥部与徐某某签订《产权调换补偿协议书》，该协议第二条约定的补偿方式为“徐某某选择住宅楼回迁，选择住宅楼两套均为十二层以下小高层，户型以120㎡和80㎡户型设计……”。协议签订后，徐某某领取房屋及地上附着物补偿款、临时安置费、搬迁费等共计152984元。2017年7月，指挥部交付徐建勋一套100㎡楼房安置。对此，相关部门答复称“根据当时的拆迁政策，徐某某只能享受100㎡安置房一套。”徐某某不服，遂起诉请求判令安丘市人民政府继续履行《产权调换补偿协议书》，交付剩余的100㎡楼房。
            - paragraph [ref=e163]:
              - strong [ref=e164]: （二）裁判结果
            - paragraph [ref=e165]: 潍坊市中级人民法院一审认为，根据行政诉讼法第七十五条的规定，行政行为有实施主体不具有行政主体资格或者没有依据等重大且明显违法情形的，人民法院判决确认无效。本案中，安丘市人民政府作为旧城改造项目的法定实施主体，制定了安置补偿政策的具体标准，该标准构成签订安置补偿协议的依据，而涉案《产权调换补偿协议书》关于给徐某某两套回迁安置房的约定条款严重突破了安置补偿政策，应当视为该约定内容没有依据，属于无效情形。同时考虑到签订涉案协议的目的是为改善居民生活条件、实现社会公共利益，如果徐某某依据违反拆迁政策的协议条款再获得100㎡的安置房，势必增加政府在旧村改造项目中的公共支出，侵犯整个片区的补偿安置秩序，损害社会公共利益。因此，根据合同法第五十二条之规定，涉案争议条款关于给徐某某两套回迁安置房的约定不符合协议目的，损害社会公共利益，亦应无效。故徐某某在按照安置补偿政策已获得相应补偿的情况下，其再要求安丘市人民政府交付剩余100㎡的安置楼房，缺乏事实和法律依据，人民法院遂判决驳回徐某某的诉讼请求。双方当事人未上诉。
