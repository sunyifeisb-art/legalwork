      - generic [ref=e107]:
        - generic [ref=e108]:
          - heading "行政诉讼的原告可以撤诉吗" [level=1] [ref=e109]: 行政诉讼的原告可以撤诉吗
          - generic [ref=e110]:
            - text: 2023-10-10 13:56
            - generic [ref=e111]: 发布于：山东省
        - article [ref=e112]:
          - paragraph [ref=e113]: 在现实生活中，有些自然人或者法人，会对行政机关作出的行政行为不服的，不服具个行政行为时，可以申请行政复议或者提起行政诉讼，请求撤销该行政行为，那么行政诉讼案件可不可以撤诉?
          - paragraph [ref=e114]:
            - strong [ref=e115]: 网友咨询：
          - paragraph [ref=e116]: 行政诉讼的原告可以撤诉吗
          - paragraph [ref=e117]:
            - strong [ref=e118]: 律师解答：
          - paragraph [ref=e119]: 行政诉讼的原告可以在法院对行政案件宣告判决或者裁定前申请撤诉，是否准许，由人民法院裁定。
          - paragraph [ref=e120]: 经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理。
          - paragraph [ref=e121]: 根据《行政诉讼法》第六十二条的规定：人民法院对行政案件宣告判决或者裁定前，原告申请撤诉的，或者被告改变其所作的行政行为，原告同意并申请撤诉的，是否准许，由人民法院裁定。
          - paragraph [ref=e122]:
            - strong [ref=e123]: 律师补充：
          - paragraph [ref=e124]: 行政诉讼法院驳回起诉的条件如下：
          - paragraph [ref=e125]: 1.不符合行政诉讼起诉条件的;
          - paragraph [ref=e126]: 2.超过法定起诉期限且无正当理由的;
          - paragraph [ref=e127]: 3.错列被告且拒绝变更的;
          - paragraph [ref=e128]: 4.未按照法律规定由法定代理人、指定代理人、代表人为诉讼行为的;
          - paragraph [ref=e129]: 5.未按照法律、法规规定先向行政机关申请复议的;
          - paragraph [ref=e130]: 6.重复起诉的;
          - paragraph [ref=e131]: 7.撤回起诉后无正当理由再行起诉的;
          - paragraph [ref=e132]: 8.行政行为对其合法权益明显不产生实际影响的;
          - paragraph [ref=e133]: 9.诉讼标的已为生效裁判所羁束的;
          - paragraph [ref=e134]: 10.不符合其他法定起诉条件的。
          - paragraph [ref=e135]: 人民法院经过阅卷、调查和询问当事人，认为不需要开庭审理的，可以迳行裁定驳回起诉。
          - paragraph [ref=e136]: 【法律法规】
          - paragraph [ref=e137]: 《中华人民共和国行政诉讼法》第五十八条
          - paragraph [ref=e138]: 经人民法院传票传唤，原告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以按照撤诉处理；被告无正当理由拒不到庭，或者未经法庭许可中途退庭的，可以缺席判决。
          - paragraph [ref=e139]: 《中华人民共和国行政诉讼法》第六十二条
          - paragraph [ref=e140]: 人民法院对行政案件宣告判决或者裁定前，原告申请撤诉的，或者被告改变其所作的行政行为，原告同意并申请撤诉的，是否准许，由人民法院裁定。
