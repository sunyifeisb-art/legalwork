      - paragraph [ref=e41]: 最高人民法院
      - paragraph [ref=e42]:
        - strong [ref=e43]: 关于认真贯彻执行《关于行政诉讼撤诉
      - paragraph [ref=e44]:
        - strong [ref=e45]: 若干问题的规定》的通知
      - paragraph [ref=e46]: 法发〔2008〕9号
      - paragraph [ref=e47]: 各省、自治区、直辖市高级人民法院，新疆维吾尔自治区高级人民法院生产建设兵团分院：
      - paragraph [ref=e48]:
        - generic [ref=e49]: 《最高人民法院关于行政诉讼撤诉若干问题的规定》（以下简称《撤诉规定》）已由最高人民法院审判委员会第1441次会议通过，于2008年2月1日起施行。为准确把握和正确适用《撤诉规定》，现就有关问题通知如下：
      - paragraph [ref=e50]:
        - generic [ref=e51]: 一、充分认识制定实施《撤诉规定》的重要意义
      - paragraph [ref=e52]:
        - generic [ref=e53]: 我国行政诉讼法颁布实施以来，各级人民法院不断重视加强和积极开展行政审判工作，取得了举世瞩目的成就，为保护公民、法人和其他组织的合法权益，监督、支持和促进依法行政，维护社会的和谐与稳定，做出了重要贡献。同时也应当看到，随着时代的进步、形势的发展和人民群众对司法救济的期待不断增强，行政诉讼制度在一些方面已经难以满足审判实践的需要，其中行政争议解决方式的完善，是一个亟待解决的问题。在社会转型加速、社会矛盾凸显的新形势下，行政争议不仅数量逐渐增多，情况也越来越复杂，积极探索和完善行政诉讼处理新机制，对于妥善处理行政争议，增进当事人与行政机关之间的理解和信任，维护社会的和谐稳定，具有重要意义。党中央、国务院对于加强和改进行政审判工作极为重视，并对积极稳妥地推进行政诉讼改革，健全行政争议解决机制提出了明确要求。《撤诉规定》的制定和施行，是最高人民法院深化司法制度改革的一项重要措施，对于规范行政诉讼撤诉，妥善化解行政争议具有重要的意义。各级人民法院要深刻理解制定实施《撤诉规定》的重要性，在审判实践中认真贯彻执行。
      - paragraph [ref=e54]: 二、执行中应当注意处理好的几个问题
      - paragraph [ref=e55]: 一是以依法妥善处理行政争议为目标。制定《撤诉规定》的主要目的，是为了妥善化解行政争议，依法审查行政诉讼中行政机关改变被诉具体行政行为及当事人申请撤诉的行为。人民法院经审查认为被诉具体行政行为违法或者明显不当，可以根据案件的具体情况，建议被告改变其所作的具体行政行为，主动赔偿或补偿原告的损失，原告同意后可以申请撤诉。这种处理机制是在法律允许范围内的制度创新，是新形势下解决行政争议的一项有效制度，是实现“案结事了”，促进“官”民和谐的必然要求。各级人民法院要通过认真执行《撤诉规定》，积极探索协调解决行政争议的新机制。特别是对于群体性行政争议、因农村土地征收、城市房屋拆迁、企业改制、劳动和社会保障、资源环保等社会热点问题引发的行政争议，更要注意最大限度地采取协调方式处理。鼓励和提倡双方当事人通过合意协商，在妥善解决争议的基础上通过撤诉的方式结案。
      - paragraph [ref=e56]: 二是正确处理合法性审查与当事人撤诉的关系。提倡和鼓励以当事人撤诉的方式结案，不能排除或放弃合法性审查原则。人民法院应当在通过对具体行政行为的合法性、适当性进行审查，初步确认具体行政行为违法或明显不当的基础上，根据案件具体情况建议被告改变被诉具体行政行为。被告改变其所作的具体行政行为及原告申请撤诉只有符合法定条件，人民法院才能作出准许撤诉的裁定。
      - paragraph [ref=e57]: 三是准确把握审判组织在新机制中的地位和作用。由于行政诉讼中被告改变其所作的具体行政行为，原告同意并申请撤诉，是建立在当事人自愿的基础上，合议庭可以发挥宣传、建议、协调和法律释明的作用，但要严格遵循当事人自愿原则，坚决防止和杜绝动员甚至强迫当事人撤诉的现象。既要尽可能通过协调化解行政争议，又不能片面追求撤诉率，侵害当事人合法权益。
      - paragraph [ref=e58]: 四是注意选择裁定准许撤诉的时机。在当事人之间达成的和解中，往往具有履行权利义务的内容，人民法院应当关注和解内容的履行情况，对于有履行内容且履行完毕，符合撤诉条件的，应当裁定准许撤诉；不能即时或者一次性履行的，可以裁定准许撤诉，也可以裁定中止审理，以防止约定的义务不能及时履行或者不履行，使当事人的权益再次受到侵害。
      - paragraph [ref=e59]: 五是正确处理撤诉与裁判的关系。及时救济权利，兼顾行政效率，是行政审判应当追求的目标。要正确处理好撤诉与裁判的关系，防止当判不判，久拖不结。经审查申请撤诉不符合法定条件，或者行政机关改变被诉具体行政行为后当事人不撤诉的，应当及时作出裁判。
      - paragraph [ref=e60]: 六是完善撤诉的结案方式。为了满足审判实践的需要，《撤诉规定》对撤诉裁定的方式进行了必要的完善。准许撤诉裁定可以载明被告改变被诉具体行政行为的主要内容，并可以根据案件具体情况，在裁定理由中明确被诉具体行政行为全部或者部分不再执行。准许撤回上诉或者再审申请的裁定参照上述要求制作，并可以明确被诉具体行政行为或者原裁判全部或者部分不再执行，以解决双方当事人的合意与被诉具体行政行为或者原裁判的冲突。通过对行政机关改变具体行政行为的内容及履行情况加以确认，使当事人的权利义务更加明确。由于裁定通常只解决诉讼程序方面问题，因此，上述已在裁定理由中明确、涉及实体处理的内容，在裁定主文中不再表述。
      - paragraph [ref=e61]: 七是注意撤诉的适用范围。行政机关改变被诉具体行政行为后原告申请撤诉，一般发生在第一审诉讼期间，但在第二审和再审期间也可能出现，如果片面强调判决的既判力和稳定性而不允许撤诉，不利于实现化解行政争议、妥善解决纠纷的目的。《撤诉规定》对此也作了明确规定，当事人在第二审期间申请撤回上诉，再审期间申请撤回再审申请的，均可参照本规定执行。
      - paragraph [ref=e62]: 三、认真抓好《撤诉规定》的贯彻执行
      - paragraph [ref=e63]: 《撤诉规定》虽然条款不多，但是其对于规范行政机关改变被诉具体行政行为及当事人撤诉行为，依法妥善化解行政争议，具有重要的积极作用。各级人民法院要调整工作思路，理顺工作机制，完善相关工作制度，加大对这一司法解释贯彻执行的领导和指导力度。要组织行政审判人员逐条学习理解、准确把握《撤诉规定》的精神和本通知的要求。必要时可以组织开展培训宣传活动，以增进人民群众和行政机关的理解与支持。各高级人民法院和中级人民法院要加强调查研究和对下指导，结合本地实际情况制定实施方案，对于执行过程中出现的新情况新问题，要及时报告上级人民法院。
      - paragraph [ref=e64]: 特此通知。
      - paragraph [ref=e65]: 2008年1月31日
