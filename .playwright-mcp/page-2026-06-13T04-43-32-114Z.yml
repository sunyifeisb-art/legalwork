            - generic [ref=e453]:
              - heading "我有出租车驾驶员资格证，但现在有个酒驾12分满分。如果重新拿回暂扣的驾驶证后可以开营运车吗？" [level=3] [ref=e455]:
                - link "我有出租车驾驶员资格证，但现在有个酒驾12分满分。如果重新拿回暂扣的驾驶证后可以开营运车吗？" [ref=e456] [cursor=pointer]:
                  - /url: //www.66law.cn/question/55930578.aspx
              - generic [ref=e457]:
                - link [ref=e458] [cursor=pointer]:
                  - /url: //chenkanlvshi.66law.cn/
                - generic [ref=e459]:
                  - link "陈侃律师" [ref=e460] [cursor=pointer]:
                    - /url: //chenkanlvshi.66law.cn/
                  - text: 58分钟前回复：
                - paragraph [ref=e461]: 重新拿回暂扣的驾驶证后，**通常不可以**开营运车。 根据《出租汽车驾驶员从业资格管理规定》第三十九条规定，出租汽车驾驶员有饮酒后驾驶记录，或者最近连续3个记分周期内记满12分记录的，由发证机关撤销其从业资格证，并公告作废。你因酒驾被记12分，符合上述情形，从业资格证很可能已被撤销。 即使从业资格证未被撤销，从申请从业资格角度看，该规定第十条明确要求申请参加出租汽车驾驶员从业资格考试的人员，需无饮酒后驾驶记录，最近连续3个记分周期内没有记满12分记录。你有酒驾且记分满分情况，不满足从业资格申请条件，无法继续从事出租车营运工作。
          - link "查看更多" [ref=e462] [cursor=pointer]:
            - /url: //www.66law.cn/laws/xzyxs/question/
