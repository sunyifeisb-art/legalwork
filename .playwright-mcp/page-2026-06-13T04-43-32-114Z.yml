        - generic [ref=e55]:
          - generic [ref=e56]:
            - heading "行政诉讼二审撤诉可以吗" [level=1] [ref=e57]
            - generic [ref=e58]:
              - generic [ref=e59]:
                - text: 来源：
                - emphasis [ref=e60]: 华律网整理
              - generic [ref=e61]: 2025-01-03
              - generic [ref=e62]:
                - emphasis [ref=e63]: "20090"
                - text: 人看过
          - generic [ref=e64]:
            - text: 起诉和撤诉都是原告一方当事人的权利，如果要起诉的，是需要递交
            - link "起诉状" [ref=e65] [cursor=pointer]:
              - /url: //www.66law.cn/special/qsz/
            - text: 的。如果要撤诉的，在一般情况下，需要在一审程序中提起。不过有的行政诉讼案件中，可能当事人会在二审中申请撤诉。那么，行政诉讼二审撤诉可以吗？下面，
            - link "华律网" [ref=e66] [cursor=pointer]:
              - /url: //www.66law.cn/
            - text: 小编详细为您介绍具体内容。
          - generic [ref=e67]:
            - paragraph [ref=e68]:
              - text: 在行政诉讼第二审期间,行政机关改变被诉具体行政行为,原审原告因行政机关在二审期间改变被诉行政行为而达成和解合意,提出申请撤回起诉,是可以的。撤回起诉的决定，需要由人民
              - link "法院" [ref=e69] [cursor=pointer]:
                - /url: //www.66law.cn/special/fayuan/
              - text: 依法裁量。
            - paragraph [ref=e70]: 撤诉的概念
            - paragraph [ref=e71]:
              - img "华律网" [ref=e72]
            - paragraph [ref=e73]: 行政诉讼中的撤诉，是指原告或上诉人(或原审原告或原审上诉人)自立案至人民法院作出裁判前，向法院撤回自己的诉讼请求，不再要求人民法院对案件进行审理的行为。根据撤诉所处的审级不同，撤诉可分为撤回起诉、撤回上诉和撤回再审申请三类，其主体分别为原告、上诉人和原审原告或原审上诉人。
            - paragraph [ref=e74]: 根据撤诉是否由当事人提出，可将撤诉分为申请撤诉和视为申请撤诉两类。前者指当事人主动向受诉人民法院提出撤诉申请，不再要求受诉人民法院对案件继续进行审理，是当事人对自己诉讼权利的积极处分；后者指当事人拒绝履行法定诉讼义务，视为其申请撤诉的情形，它是当事人对自己诉讼权利的消极处分。
            - paragraph [ref=e75]: 行政诉讼中，二审法院对上诉案件如何处理?
            - paragraph [ref=e76]: 1、原判决认定事实清楚，适用法律、法规正确的，判决驳回上诉，维持原判;
            - paragraph [ref=e77]: 2、原判决认定事实清楚，但适用法律、法规错误的，依法改判;
            - paragraph [ref=e78]: 3、原判决认定事实不清，证据不足，或者由于违反法定程序可能影响案件正确判决的，裁定撤销原判，发回原审人民法院重审，也可以查清事实后改判。当事人对重审案件的判决、裁定，可以上诉。
            - paragraph [ref=e79]: 但是是否准许撤诉，就需要由人民法院自由裁量了。如果撤回起诉的话，当事人在一般情况下不能再次起诉。要是你还有什么不明白的地方，不妨向我们华律网的律师进行咨询。
