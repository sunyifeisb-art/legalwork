          - generic [ref=e54]:
            - blockquote [ref=e55]:
              - text: 
              - paragraph [ref=e56]: 《最高人民法院关于审理行政协议案件若干问题的规定》已于2019年11月12日由最高人民法院审判委员会第1781次会议通过，现予公布，自2020年1月1日起施行。
              - paragraph [ref=e57]:
                - text: 最高人民法院
                - text: 2019年11月27日
            - paragraph [ref=e58]:
              - strong [ref=e60]: 最高人民法院关于审理行政协议案件若干问题的规定
            - paragraph [ref=e61]: 法释〔2019〕17号
            - paragraph [ref=e62]: 为依法公正、及时审理行政协议案件，根据《中华人民共和国行政诉讼法》等法律的规定，结合行政审判工作实际，制定本规定。
            - paragraph [ref=e63]: 第一条 行政机关为了实现行政管理或者公共服务目标，与公民、法人或者其他组织协商订立的具有行政法上权利义务内容的协议，属于行政诉讼法第十二条第一款第十一项规定的行政协议。
            - paragraph [ref=e64]: 第二条 公民、法人或者其他组织就下列行政协议提起行政诉讼的，人民法院应当依法受理：
            - paragraph [ref=e65]: （一）政府特许经营协议；
            - paragraph [ref=e66]: （二）土地、房屋等征收征用补偿协议；
            - paragraph [ref=e67]: （三）矿业权等国有自然资源使用权出让协议；
            - paragraph [ref=e68]: （四）政府投资的保障性住房的租赁、买卖等协议；
            - paragraph [ref=e69]: （五）符合本规定第一条规定的政府与社会资本合作协议；
            - paragraph [ref=e70]: （六）其他行政协议。
            - paragraph [ref=e71]: 第三条 因行政机关订立的下列协议提起诉讼的，不属于人民法院行政诉讼的受案范围：
            - paragraph [ref=e72]: （一）行政机关之间因公务协助等事由而订立的协议；
            - paragraph [ref=e73]: （二）行政机关与其工作人员订立的劳动人事协议。
            - paragraph [ref=e74]: 第四条 因行政协议的订立、履行、变更、终止等发生纠纷，公民、法人或者其他组织作为原告，以行政机关为被告提起行政诉讼的，人民法院应当依法受理。
            - paragraph [ref=e75]: 因行政机关委托的组织订立的行政协议发生纠纷的，委托的行政机关是被告。
            - paragraph [ref=e76]: 第五条 下列与行政协议有利害关系的公民、法人或者其他组织提起行政诉讼的，人民法院应当依法受理：
            - paragraph [ref=e77]: （一）参与招标、拍卖、挂牌等竞争性活动，认为行政机关应当依法与其订立行政协议但行政机关拒绝订立，或者认为行政机关与他人订立行政协议损害其合法权益的公民、法人或者其他组织；
            - paragraph [ref=e78]: （二）认为征收征用补偿协议损害其合法权益的被征收征用土地、房屋等不动产的用益物权人、公房承租人；
            - paragraph [ref=e79]: （三）其他认为行政协议的订立、履行、变更、终止等行为损害其合法权益的公民、法人或者其他组织。
            - paragraph [ref=e80]: 第六条 人民法院受理行政协议案件后，被告就该协议的订立、履行、变更、终止等提起反诉的，人民法院不予准许。
            - paragraph [ref=e81]: 第七条 当事人书面协议约定选择被告所在地、原告所在地、协议履行地、协议订立地、标的物所在地等与争议有实际联系地点的人民法院管辖的，人民法院从其约定，但违反级别管辖和专属管辖的除外。
            - paragraph [ref=e82]: 第八条 公民、法人或者其他组织向人民法院提起民事诉讼，生效法律文书以涉案协议属于行政协议为由裁定不予立案或者驳回起诉，当事人又提起行政诉讼的，人民法院应当依法受理。
            - paragraph [ref=e83]: 第九条 在行政协议案件中，行政诉讼法第四十九条第三项规定的“有具体的诉讼请求”是指：
            - paragraph [ref=e84]: （一）请求判决撤销行政机关变更、解除行政协议的行政行为，或者确认该行政行为违法；
            - paragraph [ref=e85]: （二）请求判决行政机关依法履行或者按照行政协议约定履行义务；
            - paragraph [ref=e86]: （三）请求判决确认行政协议的效力；
            - paragraph [ref=e87]: （四）请求判决行政机关依法或者按照约定订立行政协议；
            - paragraph [ref=e88]: （五）请求判决撤销、解除行政协议；
            - paragraph [ref=e89]: （六）请求判决行政机关赔偿或者补偿；
            - paragraph [ref=e90]: （七）其他有关行政协议的订立、履行、变更、终止等诉讼请求。
            - paragraph [ref=e91]: 第十条 被告对于自己具有法定职权、履行法定程序、履行相应法定职责以及订立、履行、变更、解除行政协议等行为的合法性承担举证责任。
            - paragraph [ref=e92]: 原告主张撤销、解除行政协议的，对撤销、解除行政协议的事由承担举证责任。
            - paragraph [ref=e93]: 对行政协议是否履行发生争议的，由负有履行义务的当事人承担举证责任。
            - paragraph [ref=e94]: 第十一条 人民法院审理行政协议案件，应当对被告订立、履行、变更、解除行政协议的行为是否具有法定职权、是否滥用职权、适用法律法规是否正确、是否遵守法定程序、是否明显不当、是否履行相应法定职责进行合法性审查。
            - paragraph [ref=e95]: 原告认为被告未依法或者未按照约定履行行政协议的，人民法院应当针对其诉讼请求，对被告是否具有相应义务或者履行相应义务等进行审查。
            - paragraph [ref=e96]: 第十二条 行政协议存在行政诉讼法第七十五条规定的重大且明显违法情形的，人民法院应当确认行政协议无效。
            - paragraph [ref=e97]: 人民法院可以适用民事法律规范确认行政协议无效。
            - paragraph [ref=e98]: 行政协议无效的原因在一审法庭辩论终结前消除的，人民法院可以确认行政协议有效。
            - paragraph [ref=e99]: 第十三条 法律、行政法规规定应当经过其他机关批准等程序后生效的行政协议，在一审法庭辩论终结前未获得批准的，人民法院应当确认该协议未生效。
            - paragraph [ref=e100]: 行政协议约定被告负有履行批准程序等义务而被告未履行，原告要求被告承担赔偿责任的，人民法院应予支持。
            - paragraph [ref=e101]: 第十四条 原告认为行政协议存在胁迫、欺诈、重大误解、显失公平等情形而请求撤销，人民法院经审理认为符合法律规定可撤销情形的，可以依法判决撤销该协议。
            - paragraph [ref=e102]: 第十五条 行政协议无效、被撤销或者确定不发生效力后，当事人因行政协议取得的财产，人民法院应当判决予以返还；不能返还的，判决折价补偿。
            - paragraph [ref=e103]: 因被告的原因导致行政协议被确认无效或者被撤销，可以同时判决责令被告采取补救措施；给原告造成损失的，人民法院应当判决被告予以赔偿。
            - paragraph [ref=e104]: 第十六条 在履行行政协议过程中，可能出现严重损害国家利益、社会公共利益的情形，被告作出变更、解除协议的行政行为后，原告请求撤销该行为，人民法院经审理认为该行为合法的，判决驳回原告诉讼请求；给原告造成损失的，判决被告予以补偿。
            - paragraph [ref=e105]: 被告变更、解除行政协议的行政行为存在行政诉讼法第七十条规定情形的，人民法院判决撤销或者部分撤销，并可以责令被告重新作出行政行为。
            - paragraph [ref=e106]: 被告变更、解除行政协议的行政行为违法，人民法院可以依据行政诉讼法第七十八条的规定判决被告继续履行协议、采取补救措施；给原告造成损失的，判决被告予以赔偿。
            - paragraph [ref=e107]: 第十七条 原告请求解除行政协议，人民法院认为符合约定或者法定解除情形且不损害国家利益、社会公共利益和他人合法权益的，可以判决解除该协议。
            - paragraph [ref=e108]: 第十八条 当事人依据民事法律规范的规定行使履行抗辩权的，人民法院应予支持。
            - paragraph [ref=e109]: 第十九条 被告未依法履行、未按照约定履行行政协议，人民法院可以依据行政诉讼法第七十八条的规定，结合原告诉讼请求，判决被告继续履行，并明确继续履行的具体内容；被告无法履行或者继续履行无实际意义的，人民法院可以判决被告采取相应的补救措施；给原告造成损失的，判决被告予以赔偿。
            - paragraph [ref=e110]: 原告要求按照约定的违约金条款或者定金条款予以赔偿的，人民法院应予支持。
            - paragraph [ref=e111]: 第二十条 被告明确表示或者以自己的行为表明不履行行政协议，原告在履行期限届满之前向人民法院起诉请求其承担违约责任的，人民法院应予支持。
            - paragraph [ref=e112]: 第二十一条 被告或者其他行政机关因国家利益、社会公共利益的需要依法行使行政职权，导致原告履行不能、履行费用明显增加或者遭受损失，原告请求判令被告给予补偿的，人民法院应予支持。
            - paragraph [ref=e113]: 第二十二条 原告以被告违约为由请求人民法院判令其承担违约责任，人民法院经审理认为行政协议无效的，应当向原告释明，并根据原告变更后的诉讼请求判决确认行政协议无效；因被告的行为造成行政协议无效的，人民法院可以依法判决被告承担赔偿责任。原告经释明后拒绝变更诉讼请求的，人民法院可以判决驳回其诉讼请求。
            - paragraph [ref=e114]: 第二十三条 人民法院审理行政协议案件，可以依法进行调解。
            - paragraph [ref=e115]: 人民法院进行调解时，应当遵循自愿、合法原则，不得损害国家利益、社会公共利益和他人合法权益。
            - paragraph [ref=e116]: 第二十四条 公民、法人或者其他组织未按照行政协议约定履行义务，经催告后不履行，行政机关可以作出要求其履行协议的书面决定。公民、法人或者其他组织收到书面决定后在法定期限内未申请行政复议或者提起行政诉讼，且仍不履行，协议内容具有可执行性的，行政机关可以向人民法院申请强制执行。
            - paragraph [ref=e117]: 法律、行政法规规定行政机关对行政协议享有监督协议履行的职权，公民、法人或者其他组织未按照约定履行义务，经催告后不履行，行政机关可以依法作出处理决定。公民、法人或者其他组织在收到该处理决定后在法定期限内未申请行政复议或者提起行政诉讼，且仍不履行，协议内容具有可执行性的，行政机关可以向人民法院申请强制执行。
            - paragraph [ref=e118]: 第二十五条 公民、法人或者其他组织对行政机关不依法履行、未按照约定履行行政协议提起诉讼的，诉讼时效参照民事法律规范确定；对行政机关变更、解除行政协议等行政行为提起诉讼的，起诉期限依照行政诉讼法及其司法解释确定。
            - paragraph [ref=e119]: 第二十六条 行政协议约定仲裁条款的，人民法院应当确认该条款无效，但法律、行政法规或者我国缔结、参加的国际条约另有规定的除外。
            - paragraph [ref=e120]: 第二十七条 人民法院审理行政协议案件，应当适用行政诉讼法的规定；行政诉讼法没有规定的，参照适用民事诉讼法的规定。
            - paragraph [ref=e121]: 人民法院审理行政协议案件，可以参照适用民事法律规范关于民事合同的相关规定。
            - paragraph [ref=e122]: 第二十八条 2015年5月1日后订立的行政协议发生纠纷的，适用行政诉讼法及本规定。
            - paragraph [ref=e123]: 2015年5月1日前订立的行政协议发生纠纷的，适用当时的法律、行政法规及司法解释。
            - paragraph [ref=e124]: 第二十九条 本规定自2020年1月1日起施行。最高人民法院以前发布的司法解释与本规定不一致的，适用本规定。
            - paragraph [ref=e125]:
              - link "最高院发布审理行政协议案件司法解释（附全文）" [ref=e126] [cursor=pointer]:
                - /url: https://image.sxls.com/2019/12/xingzhengxieyi.jpg
                - img "最高院发布审理行政协议案件司法解释（附全文）" [ref=e127]
            - paragraph [ref=e128]:
              - strong [ref=e130]: 本次行政协议司法解释的主要内容
            - paragraph [ref=e131]: 行政协议司法解释全文共29条。主要规定了以下几个方面的内容：
            - paragraph [ref=e132]:
              - strong [ref=e134]: （一）明确行政协议的定义和范围，切实保障行政协议当事人的合法权益
            - paragraph [ref=e135]:
              - strong [ref=e136]: ——明确了行政协议的内涵。
              - text: 司法解释第1条规定，行政机关为了实现行政管理或者公共服务目标，与公民、法人或者其他组织协商订立的具有行政法上权利义务内容的协议，属于行政诉讼法第十二条第一款第十一项规定的行政协议。根据这一规定，行政协议包括四个要素：一是主体要素，即必须一方当事人为行政机关；二是目的要素，即必须是为了实现行政管理或者公共服务目标；三是内容要素，协议内容必须具有行政法上的权利义务内容；四是意思要素，即协议双方当事人必须协商一致。通过对行政协议内涵的规定，明确行政协议与民事合同之间的区别。
            - paragraph [ref=e137]:
              - strong [ref=e138]: ——明确规定了行政协议的范围。
              - text: 行政诉讼法规定，政府特许经营协议、土地房屋征收补偿协议等协议属于行政协议范围。司法解释对除上述两类协议之外的类型进行了列举。主要包括：矿业权出让协议等国有自然资源使用权出让协议；政府投资的保障性住房的租赁、买卖等协议；符合司法解释规定的政府与社会资本合作协议等等。通过对国有自然资源使用权出让协议的审理，将有效解决过去一段时间，国有自然资源领域政府不履约、不监管、权力寻租等乱象，确保国有资产等国家利益得到有力保护；通过对政府投资的保障性住房的租赁、买卖等协议，将有力保障城市低收入群体的“房子是用来住的”合法权益；通过对政府与社会资本合作协议的审理，将有利于保障社会资本方参与公私合作的积极性和安全感，有利于营造公平竞争环境，有利于非公有制经济健康发展。
            - paragraph [ref=e139]:
              - strong [ref=e140]: ——明确排除了行政机关的内部协议、人事协议。
              - text: 为了准确把握行政协议的范围，司法解释进一步规定，对于行政机关之间因公务协助等事由而订立的协议、行政机关与其工作人员订立的劳动人事协议，不符合行政协议的基本要素，不属于人民法院行政诉讼受案范围。
            - paragraph [ref=e141]:
              - strong [ref=e143]: （二）明确行政协议诉讼主体资格，保障当事人诉讼权利
            - paragraph [ref=e144]:
              - strong [ref=e145]: ——明确了行政协议诉讼原告资格。
              - text: 行政协议往往涉及国家利益和社会公共利益，往往涉及行政管理目标的实现。因此，在行政协议订立过程中，需要遵循“公开、公平、公正”的行政法原则。行政协议案件中，行政协议的订立和履行不仅涉及到协议当事人的权利义务，也涉及到行政协议当事人之外的利害关系人的权利义务。司法解释根据行政诉讼法的规定，规定了行政协议中的利害关系人的原告资格，不局限于民事合同的相对性原则。为了保证公平竞争权人在行政协议订立中的权益，规定了公平竞争权人的原告资格；为了保障被征收、征用人、公房承租人等弱势群体的实体权益，规定了用益物权人和公房承租人的原告资格。
            - paragraph [ref=e146]:
              - strong [ref=e147]: ——明确了行政机关的被告资格。
              - text: 基于行政协议诉讼“民告官”的定位，司法解释规定，因行政协议的订立、履行、变更、终止等产生纠纷，公民、法人或者其他组织作为原告，以行政机关为被告提起行政诉讼的，人民法院应当依法受理。人民法院受理行政协议案件后，被告就该协议的订立、履行、变更、终止等提起反诉的，人民法院不予准许。
            - paragraph [ref=e148]:
              - strong [ref=e150]: （三）坚持行政协议诉讼的全面管辖原则，确保案件公正审理
            - paragraph [ref=e151]: 行政协议诉讼既包括了行政机关行使行政优益权的行政行为诉讼，也包括了行政机关不依法履行、未按照约定履行协议义务的违约诉讼。司法解释针对不同的诉讼请求，确立了不同的审理规则。
            - paragraph [ref=e152]:
              - strong [ref=e153]: ——明确行政协议诉讼种类。
              - text: 为了便于当事人提起行政协议诉讼，司法解释根据行政诉讼法的规定，明确了行政协议诉讼的具体种类，主要包括：请求判决撤销行政机关行使优益权的行政行为或者确认该行政行为违法；请求判决行政机关依法履行或者按照行政协议约定履行义务；请求判决确认行政协议的效力；请求判决行政机关依法或者按照约定订立行政协议；请求判决撤销、解除行政协议；请求判决行政机关赔偿或者补偿；等等，基本上包括了所有的行政协议类型，确保当事人的合法诉求在行政诉讼中得到全面实现。
            - paragraph [ref=e154]:
              - strong [ref=e155]: ——明确不同诉讼类型的举证责任。
              - text: 司法解释根据当事人的不同诉求，结合行政机关在行政协议中的地位，区别情况规定了举证责任。被告对于具有法定职权、履行法定程序、履行相应法定职责以及订立、履行、变更、解除行政协议等行为的合法性承担举证责任；原告主张撤销、解除行政协议的，对撤销、解除行政协议的事由承担举证责任；对行政协议是否履行发生争议的，由负有履行义务的当事人承担举证责任。
            - paragraph [ref=e156]:
              - strong [ref=e158]: （四）坚持对行政机关行使优益权行为的合法性审查，确保行政机关“法无授权不可为”原则落实
            - paragraph [ref=e159]:
              - strong [ref=e160]: ——明确对行政优益权行为的合法性审查。
              - text: 司法解释坚持对被诉行政行为合法性进行审查，明确规定，人民法院审理行政协议案件，应当根据行政诉讼法第70条的规定对被告订立、履行、变更、解除行政协议的行为是否具有法定职权、是否滥用职权、适用法律法规是否正确、是否遵守法定程序、是否明显不当、是否履行相应法定职责进行全面的合法性审查，不受原告诉讼请求的限制。
            - paragraph [ref=e161]:
              - strong [ref=e162]: ——明确对行政优益权行为的裁判方式。
              - text: 针对行政机关作出的单方变更、解除行政协议等行使优益权的行为，司法解释规定了不同的裁判方式：在履行行政协议过程中，可能出现严重损害国家利益、社会公共利益的情形，被告作出变更、解除协议的行政行为后，原告请求撤销该行为，人民法院经审理认为该行为合法的，判决驳回原告诉讼请求；给原告造成损失的，判决被告予以补偿；被告行使行政优益权的行为违法的，人民法院判决撤销或者部分撤销，并可以责令被告重新作出行政行为；被告行使行政优益权的行政行为违法，人民法院可以判决继续履行协议、采取补救措施；给原告造成损失的，判决被告予以赔偿。
            - paragraph [ref=e163]:
              - strong [ref=e164]: ——明确行政机关依法行使行政职权造成损害的补偿。
              - text: 对于合法的行政行为造成损害的，行政机关应当依法补偿。司法解释规定，被告或者其他行政机关因国家利益、社会公共利益的需要依法行使行政职权，导致原告履行不能、履行费用明显增加或者遭受损失，原告请求判令被告给予补偿的，人民法院应予支持。
            - paragraph [ref=e165]:
              - strong [ref=e167]: （五）依法确认行政协议的效力，确保国家利益、社会公共利益和私人合法权益的平衡
            - paragraph [ref=e168]:
              - strong [ref=e169]: ——明确行政协议无效情形。
              - text: 司法解释结合行政协议的特点，结合行政诉讼法关于无效行政行为的规定，对行政协议无效的情形作了明确。行政协议存在重大且明显违法情形的，人民法院应当确认行政协议无效；人民法院可以适用民事法律规范确认行政协议无效；行政协议无效的原因在一审法庭辩论终结前消除的，人民法院可以确认行政协议有效。
            - paragraph [ref=e170]:
              - strong [ref=e171]: ——明确行政协议效力待定情形。
              - text: 司法解释规定，法律、行政法规规定应当经过其他机关批准等程序后生效的行政协议，在一审法庭辩论终结前未获得批准的，人民法院应当确定该协议不发生效力；行政协议约定被告负有履行批准程序等义务而被告未履行，原告要求被告承担赔偿责任的，人民法院应予支持。
            - paragraph [ref=e172]:
              - strong [ref=e173]: ——明确行政协议可撤销情形。
              - text: 司法解释参照合同法等民事法律规范的规定，规定了行政协议可撤销的情形。司法解释规定，原告认为行政协议存在胁迫、欺诈、重大误解、显失公平等情形而请求撤销，人民法院经审理认为符合法律规定的可撤销情形的，可以依法判决撤销该协议。
            - paragraph [ref=e174]:
              - strong [ref=e175]: ——明确行政协议解除情形。
              - text: 司法解释规定，原告请求解除行政协议，人民法院认为符合约定或者法定解除情形且不损害国家利益、社会公共利益和他人合法权益的，可以判决解除该协议。
            - paragraph [ref=e176]:
              - strong [ref=e178]: （六）坚持行政协议充分赔偿原则，确保行政协议当事人实体权益实现
            - paragraph [ref=e179]:
              - strong [ref=e180]: ——明确了行政协议的给付判决。
              - text: 为了确保行政协议当事人实际权益，回应当事人实质诉求，司法解释规定了具体给付判决。司法解释规定，被告未依法履行、未按照约定履行行政协议，人民法院可以依法判决被告继续履行，并明确继续履行的具体内容；被告无法履行或者继续履行无实际意义的，人民法院可以判决被告采取相应的补救措施；给原告造成损失的，判决被告予以赔偿。
            - paragraph [ref=e181]:
              - strong [ref=e182]: ——明确了行政协议违约责任。
              - text: 行政机关违约的，应当充分赔偿当事人的实际损失。司法解释规定，原告要求按照约定的违约金条款或者定金条款予以赔偿的，人民法院应予支持。被告明确表示或者以自己的行为表明不履行行政协议义务，原告在履行期限届满之前向人民法院起诉请求其承担违约责任的，人民法院应予支持。
            - paragraph [ref=e183]:
              - strong [ref=e184]: ——明确了行政协议案件中的诉讼类型转换。
              - text: 行政协议诉讼是公法诉讼，具有维护国家利益和社会公共利益的客观诉讼性质。司法解释规定，原告以被告违约为由请求人民法院判令其承担违约责任，人民法院经审理认为行政协议无效的，应当向原告释明，并根据原告变更后的诉讼请求判决确认行政协议无效；因被告的行为造成行政协议无效的，人民法院可以依法判决被告承担赔偿责任。原告经释明拒绝变更诉讼请求的，人民法院可以判决驳回其诉讼请求。
            - paragraph [ref=e185]:
              - strong [ref=e187]: （七）规范行政协议案件的强制执行，确保国家利益、社会公共利益及时实现
            - paragraph [ref=e188]: 基于行政协议诉讼“民告官”的定位，行政机关认为行政相对人不依法、不依约履行行政协议的，可以根据行政诉讼法和行政强制法的规定，向人民法院申请强制执行。主要包括两种情形：
            - paragraph [ref=e189]:
              - strong [ref=e190]: ——以行政机关作出的履行协议决定作为执行名义，向人民法院申请强制执行。
              - text: 如果行政协议的行政相对人未按照协议履行，行政机关可以作出相应的履行协议行政决定。如果相对人未申请行政复议或者提起行政诉讼，且仍不履行，协议内容具有可执行性的，行政机关可以将该行政决定作为执行名义向人民法院申请强制执行。
            - paragraph [ref=e191]:
              - strong [ref=e192]: ——以行政机关作出的处理决定作为执行名义，向人民法院申请强制执行。
              - text: 如果法律、行政法规规定行政机关对行政协议享有监督协议履行的职权，行政机关可以对不履行协议的行政相对人作出处理决定。如果行政机关依法作出行政决定后，行政相对人未申请行政复议或者其他行政诉讼，且仍不履行，协议内容具有可执行性的，行政机关可以向人民法院申请强制执行。
            - paragraph [ref=e193]: 需要明确的是，人民法院审理行政协议案件，一般遵循实体从旧，程序从新原则，对于2015年5月1日之前订立的行政协议发生纠纷的，适用当时的法律、行政法规及司法解释；当时的法律、行政法规及司法解释没有规定的，可以适用行政诉讼法和本司法解释。
            - paragraph [ref=e194]: 下一步，人民法院将进一步贯彻党中央的各项部署和要求，严格按照行政诉讼法的规定，公正审理好行政协议案件这一新类型案件，进一步推进诚信政府法治政府建设，进一步推进政府治理能力现代化，进一步强化产权保护力度，让人民群众在每一起行政案件中感受到公平正义！
