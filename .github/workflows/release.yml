name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag, for example v0.2.3'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22
  WORKING_DIRECTORY: apps/desktop-legalwork

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: meta
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=LegalWork ${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.meta.outputs.tag_name }}" \
            --title "${{ steps.meta.outputs.release_name }}" \
            --notes "Automated release from ${{ github.sha }}" \
            --draft \
            --target "${{ github.sha }}" \
            || true

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Setup macOS signing credentials
        env:
          MAC_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          MAC_API_KEY_BASE64: ${{ secrets.MAC_API_KEY_BASE64 }}
          MAC_API_KEY_ID: ${{ secrets.MAC_API_KEY_ID }}
        run: |
          if [ -z "$MAC_CERTIFICATE_BASE64" ]; then
            echo "No macOS signing certificate configured, skipping signing setup."
            exit 0
          fi
          mkdir -p /tmp/legalwork-certs
          echo "$MAC_CERTIFICATE_BASE64" | base64 -d > /tmp/legalwork-certs/mac.p12
          echo "$MAC_API_KEY_BASE64" | base64 -d > "/tmp/legalwork-certs/AuthKey_${MAC_API_KEY_ID}.p8"
          echo "MAC_CERT_PATH=/tmp/legalwork-certs/mac.p12" >> "$GITHUB_ENV"
          echo "MAC_API_KEY_PATH=/tmp/legalwork-certs/AuthKey_${MAC_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build macOS artifacts
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          LEGALWORK_APP_VERSION: ${{ needs.create-release.outputs.version }}
          LEGALWORK_UPDATE_CHANNEL: stable
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ env.MAC_CERT_PATH || '' }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ env.MAC_API_KEY_PATH || '' }}
          APPLE_API_KEY_ID: ${{ secrets.MAC_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.MAC_API_ISSUER }}
        run: npm run dist:mac

      - name: Upload macOS assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            dist/legalwork-*-mac-* \
            dist/latest-mac.yml \
            --clobber --repo "${{ github.repository }}"

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Enable long paths for Git checkout
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Setup Windows signing credentials
        shell: bash
        env:
          WIN_CERTIFICATE_BASE64: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
        run: |
          if [ -z "$WIN_CERTIFICATE_BASE64" ]; then
            echo "No Windows signing certificate configured, skipping signing setup."
            exit 0
          fi
          mkdir -p /tmp/legalwork-certs
          echo "$WIN_CERTIFICATE_BASE64" | base64 -d > /tmp/legalwork-certs/win.pfx
          echo "WIN_CERT_PATH=/tmp/legalwork-certs/win.pfx" >> "$GITHUB_ENV"

      - name: Build Windows artifacts
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          LEGALWORK_APP_VERSION: ${{ needs.create-release.outputs.version }}
          LEGALWORK_UPDATE_CHANNEL: stable
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ env.WIN_CERT_PATH || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: npm run dist:win

      - name: Upload Windows assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        shell: bash
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            dist/legalwork-*-win-*.exe \
            dist/legalwork-*-win-*.exe.blockmap \
            dist/latest.yml \
            --clobber --repo "${{ github.repository }}"

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci

      - name: Build Linux artifacts
        working-directory: ${{ env.WORKING_DIRECTORY }}
        env:
          LEGALWORK_APP_VERSION: ${{ needs.create-release.outputs.version }}
          LEGALWORK_UPDATE_CHANNEL: stable
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --linux AppImage --x64

      - name: Upload Linux assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          gh release upload "${{ needs.create-release.outputs.tag_name }}" \
            dist/legalwork-*.AppImage \
            dist/latest-linux.yml \
            --clobber --repo "${{ github.repository }}"

  publish-release:
    name: Publish release
    needs: [create-release, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
